<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automated Resume Parser</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-lg-8">

<div class="glass-card">

<div class="text-center">

<h1 class="display-5 fw-bold text-white">

📄 Automated Resume Parser

</h1>

<p class="text-light mt-3">

Upload your resume and instantly extract candidate details.

</p>

</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="upload-box mt-5">

<i class="fa-solid fa-file-arrow-up upload-icon"></i>

<h4 class="mt-3">

Upload Resume (.txt)

</h4>

<input
type="file"
name="resume"
class="form-control mt-4"
required>

<button
type="submit"
class="btn btn-custom mt-4">

<i class="fa-solid fa-magnifying-glass"></i>

Parse Resume

</button>

</div>

</form>

<div class="row mt-5">

<div class="col-md-4">

<div class="feature-card">

<i class="fa-solid fa-user"></i>

<h5>Name Detection</h5>

</div>

</div>

<div class="col-md-4">

<div class="feature-card">

<i class="fa-solid fa-code"></i>

<h5>Skills Extraction</h5>

</div>

</div>

<div class="col-md-4">

<div class="feature-card">

<i class="fa-solid fa-database"></i>

<h5>Database Storage</h5>

</div>

</div>

</div>

<div class="text-center mt-5">

<a href="/history" class="btn btn-outline-light">

View Resume History

</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
